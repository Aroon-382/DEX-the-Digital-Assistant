<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>D.E.X the Digital Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #app {
      width: 700px;
      height: 620px;
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    #header {
      background: linear-gradient(135deg, #0a7c3e, #1565C0);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #header-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    #header h1 { color: white; font-size: 18px; font-weight: 600; }
    #header p { color: rgba(255,255,255,0.85); font-size: 12px; }

    #subjects {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
      align-items: center;
    }

    #subjects span { font-size: 13px; color: #888; }

    .subject-btn {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .subject-btn.active { opacity: 1; }
    .sci { background: #d4f5e9; color: #0a7c3e; }
    .math { background: #ddeeff; color: #1565C0; }
    .hist { background: #fff8d4; color: #b8860b; }
    .gen { background: #eeedfe; color: #534AB7; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #f8f9ff;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 80%;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bot-avatar { background: linear-gradient(135deg, #0a7c3e, #1565C0); }
    .user-avatar { background: #F5C518; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .msg.bot .bubble {
      background: white;
      color: #333;
      border-radius: 4px 16px 16px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .msg.user .bubble {
      background: #1565C0;
      color: white;
      border-radius: 16px 4px 16px 16px;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: white;
      border-radius: 4px 16px 16px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce 1s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    #input-area {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      border-radius: 20px;
      border: 1.5px solid #ddd;
      padding: 10px 16px;
      font-size: 14px;
      resize: none;
      font-family: 'Segoe UI', sans-serif;
      outline: none;
      max-height: 100px;
    }

    #msg-input:focus { border-color: #0a7c3e; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #0a7c3e;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #1565C0; }

    #reset-btn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      color: #888;
      margin-left: auto;
    }

    #reset-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-icon">🎓</div>
    <div>
      <h1>D.E.X the Digital Assistant</h1>
      <p>Your academic assistant — Science, Math & History</p>
    </div>
  </div>

  <div id="subjects">
    <span>Topic:</span>
    <button class="subject-btn sci active" onclick="setSubject('Science', this)">🔬 Science</button>
    <button class="subject-btn math" onclick="setSubject('Math', this)">📐 Math</button>
    <button class="subject-btn hist" onclick="setSubject('History', this)">📜 History</button>
    <button class="subject-btn gen" onclick="setSubject('General', this)">💡 General</button>
    <button id="reset-btn" onclick="resetChat()">🔄 New Chat</button>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="avatar bot-avatar">🎓</div>
      <div class="bubble">Hey there! 👋 I'm DEX the Digital Assistant! Pick a subject above and ask me anything — I'm here to help you learn!</div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Ask a question..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
        <path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  let currentSubject = 'Science';

  function setSubject(name, el) {
    currentSubject = name;
    document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    appendMessage('user', text);
    const typingEl = appendTyping();

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, subject: currentSubject })
    });

    const data = await res.json();
    typingEl.remove();
    appendMessage('bot', data.reply);
  }

  async function resetChat() {
    await fetch('/reset', { method: 'POST' });
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    appendMessage('bot', "Chat reset! Pick a subject and ask me anything 😊");
  }

  function appendMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const avatar = role === 'bot' ? '🎓' : '👤';
    const avatarClass = role === 'bot' ? 'bot-avatar' : 'user-avatar';
    div.innerHTML = `<div class="avatar ${avatarClass}">${avatar}</div><div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="avatar bot-avatar">🎓</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
